name: Apple Silicon CI smoke test

on:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show hardware metadata
        run: |
          mkdir -p results
          system_profiler SPHardwareDataType | tee results/hardware.txt
          system_profiler SPDisplaysDataType | tee results/display.txt
          sw_vers | tee results/macos.txt
          uname -a | tee results/uname.txt

      - name: Install dependencies
        run: |
          brew install cmake ninja git

          python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install huggingface_hub mlx mlx-lm

      - name: Build llama.cpp Metal llama-bench only
        run: |
          git clone https://github.com/ggml-org/llama.cpp.git
          cd llama.cpp
          cmake -B build-metal -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_METAL=ON \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_SERVER=OFF
          cmake --build build-metal --target llama-bench -j3

      - name: Download GGUF model
        run: |
          source .venv/bin/activate
          mkdir -p llama.cpp/models
          python - <<'PY'
          from huggingface_hub import hf_hub_download

          hf_hub_download(
              repo_id="Qwen/Qwen2.5-0.5B-Instruct-GGUF",
              filename="qwen2.5-0.5b-instruct-q4_k_m.gguf",
              local_dir="llama.cpp/models"
          )
          PY

      - name: Run llama.cpp Metal smoke test
        run: |
          cd llama.cpp
          ./build-metal/bin/llama-bench \
            -m models/qwen2.5-0.5b-instruct-q4_k_m.gguf \
            -p 512 \
            -n 128 \
            -ngl 99 \
            -o json | tee ../results/llama_metal_ci.json

      - name: Run MLX smoke test
        run: |
          source .venv/bin/activate

          cat > run_mlx_bench.py <<'PY'
          import time
          import json
          import platform
          from mlx_lm import load, generate

          model_id = "mlx-community/Qwen2.5-0.5B-Instruct-4bit"
          prompt = "Explain performance portability in local LLM inference in one paragraph."

          model, tokenizer = load(model_id)

          generate(model, tokenizer, prompt=prompt, max_tokens=16, verbose=False)

          times = []
          for _ in range(5):
              start = time.perf_counter()
              generate(model, tokenizer, prompt=prompt, max_tokens=128, verbose=False)
              end = time.perf_counter()
              times.append(end - start)

          avg_s = sum(times) / len(times)

          result = {
              "note": "GitHub Actions macOS runners use virtualized Apple Silicon / paravirtual Metal. Treat this as CI validation, not representative hardware performance.",
              "backend": "mlx_metal_ci",
              "model": model_id,
              "platform": platform.platform(),
              "machine": platform.machine(),
              "generated_tokens": 128,
              "avg_total_seconds": avg_s,
              "approx_decode_tok_s": 128 / avg_s,
              "runs": times
          }

          print(json.dumps(result, indent=2))
          PY

          python run_mlx_bench.py | tee results/mlx_metal_ci.json

      - name: Write README note
        run: |
          cat > results/README.txt <<'TXT'
          These results are CI smoke-test outputs from GitHub Actions macOS.
          They validate that the benchmark pipeline builds and runs.
          They should not be interpreted as representative physical M1/M2/M3 performance,
          because the runner reports virtualized Apple Silicon / paravirtual Metal.
          TXT

      - name: Upload smoke-test results
        uses: actions/upload-artifact@v4
        with:
          name: apple-silicon-ci-smoke-test-results
          path: results/
